name: Cross-Language Parity

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  parity:
    name: Cross-Language Parity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS
        run: npm run build -w ummalqura-chrono

      - name: Install Python dependencies
        working-directory: packages/python
        run: pip install -e .

      - name: Run cross-language parity tests
        run: python tests/cross-language/run_parity_tests.py

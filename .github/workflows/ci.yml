name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install JS dependencies
        working-directory: packages/js
        run: npm ci
        
      - name: Run ESLint
        working-directory: packages/js
        run: npm run lint
        
      - name: Run TypeScript check
        working-directory: packages/js
        run: npm run typecheck
        
      - name: Install Python dependencies
        working-directory: packages/python
        run: pip install -e ".[dev]"
        
      - name: Run Python linting
        working-directory: packages/python
        run: ruff check .

  data-integrity:
    name: Data Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify data checksum
        run: |
          cd data
          sha256sum -c ummalqura-months.sha256
          
      - name: Validate locale files
        run: |
          python scripts/validate_locales.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python package
        working-directory: packages/python
        run: pip install -e .

      - name: Validate Microsoft parity
        run: python scripts/validate_microsoft_parity.py

  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: packages/js
        run: npm ci
        
      - name: Run tests
        working-directory: packages/js
        run: npm test -- --coverage
        
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: packages/js/coverage/lcov.info
          flags: js

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        working-directory: packages/python
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-cov
          
      - name: Run tests
        working-directory: packages/python
        run: pytest --cov=ummalqura --cov-report=xml
        
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v3
        with:
          files: packages/python/coverage.xml
          flags: python

  cross-language-parity:
    name: Cross-Language Parity
    runs-on: ubuntu-latest
    needs: [test-js, test-python]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install JS dependencies
        working-directory: packages/js
        run: npm ci
        
      - name: Install Python dependencies
        working-directory: packages/python
        run: pip install -e .
        
      - name: Run cross-language parity tests
        run: |
          python tests/cross-language/run_parity_tests.py

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: packages/js
        run: npm ci
        
      - name: Run benchmarks
        working-directory: packages/js
        run: npm run benchmark
        
      - name: Save benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        working-directory: packages/js
        run: npm audit --audit-level=moderate
        
      - name: Run pip audit
        working-directory: packages/python
        run: pip-audit

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build documentation
        run: |
          echo "Documentation build placeholder"
